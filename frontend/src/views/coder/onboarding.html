<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagnóstico | Kairo</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./../../../assets/css/global.css" />
    <link rel="stylesheet" href="./../../../assets/css/onboarding.css" />

    <!-- 1. Tema antes de pintar -->
    <script src="./../../core/utils/theme.js" defer></script>

    <!-- 2. i18next CDN + i18n.js síncronos (i18next debe existir antes de i18n.js) -->
    <script src="https://unpkg.com/i18next@23.11.5/dist/umd/i18next.min.js"></script>
    <script src="./../../core/utils/i18n.js"></script>
  </head>

  <body>
    <!-- ── NAV ── -->
    <nav class="onboarding-nav">
      <div class="nav-container">
        <div class="brand">
          <span class="brand-name" data-i18n="onboarding.nav_title"
            >Diagnóstico</span
          >
        </div>

        <div class="global-progress">
          <div class="progress-info">
            <span id="navStep">B1 · Pregunta 1 de 30</span>
            <span id="navPct">3%</span>
          </div>
          <div class="progress-track">
            <div id="progress-fill" class="progress-bar"></div>
          </div>
        </div>
      </div>
    </nav>

    <!-- ── MAIN ── -->
    <main class="onboarding-main">
      <!-- Block stepper -->
      <div class="editor-tabs" id="stepper"></div>

      <!-- Card -->
      <section class="diagnostic-container">
        <header class="block-header">
          <span class="block-badge" id="block-badge">B1</span>
          <span id="block-title">Canales Sensoriales</span>
        </header>

        <div class="question-workspace" id="question-card">
          <h1 id="question-text" class="question-display">
            Preparando diagnóstico...
          </h1>

          <div id="options-container" class="options-layout"></div>

          <footer class="workspace-footer">
            <span class="progress-label">
              <strong id="qBlock">B1</strong>
              · <span data-i18n="onboarding.question_word">Pregunta</span>
              <strong id="qCurrent">01</strong>
              <span data-i18n="onboarding.of_word">de</span>
              <strong>30</strong>
            </span>
            <button
              class="btn-back"
              id="btnBack"
              onclick="onboardingController.goBack()"
              disabled
            >
              <span data-i18n="onboarding.back">← Atrás</span>
            </button>
          </footer>
        </div>
      </section>
    </main>

    <!-- ── FLOATING BUTTONS ── -->
    <div class="theme-switch-wrapper">
      <button class="theme-btn" id="language-toggle" title="Change language">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m5 8 6 6" />
          <path d="m4 14 6-6 2-3" />
          <path d="M2 5h12" />
          <path d="M7 2h1" />
          <path d="m22 22-5-10-5 10" />
          <path d="M14 18h6" />
        </svg>
      </button>

      <button class="theme-btn" id="theme-toggle" title="Cambiar tema">
        <svg
          id="moon-icon"
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </svg>
        <svg
          id="sun-icon"
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          style="display: none"
        >
          <circle cx="12" cy="12" r="4" />
          <path
            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
          />
        </svg>
      </button>
    </div>

    <script
      type="module"
      src="./../../../src/core/utils/onboarding-ui.js"
    ></script>
  </body>
</html>
