<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Riwi Learning Platform</title>
    <link rel="stylesheet" href="./../../assets/css/auth.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/i18next/dist/umd/i18next.min.js"></script>
    <script src="./../../js/theme.js" defer></script>
  </head>

  <body class="body-content">
    <main class="card-content">
      <section class="content-logo change-logo">
        <div class="container">
          <img src="./../../assets/img/logo.png" alt="Riwi Logo" />
        </div>
      </section>

      <section class="content-form">
        <header class="header">
          <h1 data-i18n="auth.reg_title">Crear cuenta</h1>
          <p data-i18n="auth.reg_p">Únete hoy mismo a la comunidad Riwi.</p>
        </header>

        <div class="social-auth-container">
          <a
            href="http://localhost:3000/api/auth/google"
            class="btn-social google"
          >
            <img
              src="https://www.svgrepo.com/show/475656/google-color.svg"
              alt="Google"
              width="20"
            />
            <span data-i18n="auth.google">Registrarse con Google</span>
          </a>

          <a
            href="http://localhost:3000/api/auth/github"
            class="btn-social github"
          >
            <img
              src="https://www.svgrepo.com/show/512317/github-142.svg"
              alt="GitHub"
              width="20"
            />
            <span data-i18n="auth.github">Registrarse con GitHub</span>
          </a>
        </div>

        <div class="separator">
          <span data-i18n="auth.or_mail"
            >O REGÍSTRATE CON TU CORREO ELECTRÓNICO</span
          >
        </div>

        <form class="form-1" id="register-form">
          <div class="inputs">
            <label for="name" data-i18n="auth.label_name"
              >Nombre Completo</label
            >
            <input type="text" id="name" required placeholder="John Doe" />
          </div>

          <div class="inputs">
            <label for="email" data-i18n="auth.label_mail">Gmail</label>
            <input
              type="email"
              id="email"
              required
              placeholder="example@riwi.io"
            />
          </div>

          <div class="inputs">
            <label for="clan-select" data-i18n="auth.label_clan"
              >Selecciona tu Clan</label
            >
            <select id="clan-select" required class="custom-select">
              <option
                value=""
                disabled
                selected
                data-i18n="auth.clan_placeholder"
              >
                Escoger clan...
              </option>
              <option value="hamilton">Hamilton</option>
              <option value="thompson">Thompson</option>
              <option value="turing">Turing</option>
              <option value="mccarthy">McCarthy</option>
              <option value="ritchie">Ritchie</option>
              <option value="tesla">Tesla</option>
            </select>
          </div>

          <div class="password-row">
            <div class="inputs">
              <label for="password" data-i18n="auth.label_pass"
                >Contraseña</label
              >
              <input
                type="password"
                id="password"
                required
                placeholder="••••••••"
              />
            </div>

            <div class="inputs">
              <label for="confirm-password" data-i18n="auth.label_confirm"
                >Confirmar</label
              >
              <input
                type="password"
                id="confirm-password"
                required
                placeholder="••••••••"
              />
            </div>
          </div>
          <div class="strength-meter">
            <div id="strength-bar" class="strength-bar"></div>
          </div>

          <input type="hidden" id="role-select" value="coder" />

          <button type="submit" class="btn-auth" data-i18n="auth.btn_reg">
            Registrarse
          </button>

          <p class="link">
            <span data-i18n="auth.has_acc">¿Ya tienes una cuenta?</span>
            <a href="./login.html" data-i18n="auth.link_login"
              >Iniciar Sesión</a
            >
          </p>
        </form>
      </section>
    </main>

    <div class="theme-switch-wrapper">
      <button
        id="language-toggle"
        class="theme-btn me-2"
        title="Change Language"
      >
        <svg
          id="lang-icon"
          class="theme-icon"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m5 8 6 6" />
          <path d="m4 14 6-6 2-3" />
          <path d="M2 5h12" />
          <path d="M7 2h1" />
          <path d="m22 22-5-10-5 10" />
          <path d="M14 18h6" />
        </svg>
      </button>

      <button id="theme-toggle" class="theme-btn" title="Toggle Theme">
        <svg
          id="moon-icon"
          class="theme-icon"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </svg>

        <svg
          id="sun-icon"
          class="theme-icon"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          style="display: none"
        >
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2" />
          <path d="M12 20v2" />
          <path d="m4.93 4.93 1.41 1.41" />
          <path d="m17.66 17.66 1.41 1.41" />
          <path d="M2 12h2" />
          <path d="M20 12h2" />
          <path d="m6.34 17.66-1.41 1.41" />
          <path d="m19.07 4.93-1.41 1.41" />
        </svg>
      </button>
    </div>

    <script src="../../js/utils/transition.js"></script>
    <script type="module" src="../../src/auth/auth-ui.js"></script>
  </body>
</html>
